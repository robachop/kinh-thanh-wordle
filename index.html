function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function getMaxTries(len) { return Math.min(len, 5); }

function normalize(s) {
  return s.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/Đ/g,"D");
}

const HINT_PENALTY = 20;

function App() {
  const [queue] = React.useState(() => shuffle(ALL_ENTRIES));
  const [qi, setQi] = useState(0);
  const [guesses, setGuesses] = useState([]);
  const [current, setCurrent] = useState("");
  const [state, setState] = useState("playing");
  const [hintsUsed, setHintsUsed] = useState(0);
  const [shake, setShake] = useState(false);
  const [revealed, setRevealed] = useState([]);
  const [streak, setStreak] = useState(0);
  const [totalScore, setTotalScore] = useState(0);
  const [lastScore, setLastScore] = useState(null);
  const [played, setPlayed] = useState(0);

  const entry = queue[qi % queue.length];
  const answer = entry.name;
  const wlen = answer.length;
  const MAX_TRIES = getMaxTries(wlen);

  useEffect(() => {
    setGuesses([]); setCurrent(""); setState("playing");
    setHintsUsed(0); setRevealed([]); setLastScore(null);
  }, [qi]);

  function getStates(guess, ans) {
    const res = Array(guess.length).fill("absent");
    const aArr = ans.split(""), gArr = guess.split(""), used = Array(ans.length).fill(false);
    gArr.forEach((l,i) => { if (normalize(l)===normalize(aArr[i])) { res[i]="correct"; used[i]=true; } });
    gArr.forEach((l,i) => {
      if (res[i]==="correct") return;
      const j = aArr.findIndex((a,idx) => !used[idx] && normalize(a)===normalize(l));
      if (j!==-1) { res[i]="present"; used[j]=true; }
    });
    return res;
  }

  function calcScore(tries, hints) {
    return Math.max(0, (MAX_TRIES - tries + 1) * 20 - hints * HINT_PENALTY);
  }

  function submit() {
    const g = current.toUpperCase();
    if (g.length !== wlen) { setShake(true); setTimeout(()=>setShake(false),500); return; }
    const states = getStates(g, answer);
    const ng = { letters: g.split(""), states };
    const newG = [...guesses, ng];
    setGuesses(newG);
    setRevealed(r => [...r, newG.length-1]);
    setCurrent("");
    if (normalize(g)===normalize(answer)) {
      const sc = calcScore(newG.length, hintsUsed);
      setTimeout(() => { setState("won"); setStreak(s=>s+1); setTotalScore(s=>s+sc); setLastScore(sc); setPlayed(p=>p+1); }, wlen*150+300);
    } else if (newG.length >= MAX_TRIES) {
      setTimeout(() => { setState("lost"); setStreak(0); setPlayed(p=>p+1); }, wlen*150+300);
    }
  }

  const handleKey = useCallback((k) => {
    if (state !== "playing") return;
    if (k==="ENTER") { submit(); return; }
    if (k==="DEL") { setCurrent(c=>c.slice(0,-1)); return; }
    if (current.length < wlen && /^[A-Za-z]$/.test(k)) setCurrent(c=>c+k.toUpperCase());
  }, [current, state, guesses, hintsUsed, wlen]);

  useEffect(() => {
    const fn = e => {
      if (e.key==="Enter") handleKey("ENTER");
      else if (e.key==="Backspace") handleKey("DEL");
      else if (e.key.length===1) handleKey(e.key);
    };
    window.addEventListener("keydown", fn);
    return () => window.removeEventListener("keydown", fn);
  }, [handleKey]);

  const sc = { correct:{bg:"#2d5a3d",bd:"#3d7a52",tx:"#fff"}, present:{bg:"#7a5010",bd:"#b07828",tx:"#fff"}, absent:{bg:"#1a1a1a",bd:"#2a2a2a",tx:"#444"}, empty:{bg:"transparent",bd:"#252525",tx:"#ddd"} };
  const KEYS = [["Q","W","E","R","T","Y","U","I","O","P"],["A","S","D","F","G","H","J","K","L"],["ENTER","Z","X","C","V","B","N","M","DEL"]];
  const kBg = {correct:"#2d5a3d",present:"#7a5010",absent:"#1a1a1a",unused:"#252525"};
  const kTx = {correct:"#adf",present:"#fda",absent:"#333",unused:"#bbb"};

  function keyColor(k) {
    let best="unused";
    guesses.forEach(g=>g.letters.forEach((l,i)=>{
      if (normalize(l)===normalize(k)) {
        if (g.states[i]==="correct") best="correct";
        else if (g.states[i]==="present"&&best!=="correct") best="present";
        else if (g.states[i]==="absent"&&best==="unused") best="absent";
      }
    }));
    return best;
  }

  const rows = Array(MAX_TRIES).fill(null).map((_,i) => {
    if (i<guesses.length) return guesses[i];
    if (i===guesses.length&&state==="playing") return {letters:current.split("").concat(Array(wlen-current.length).fill("")),states:Array(wlen).fill("empty"),isCurrent:true};
    return {letters:Array(wlen).fill(""),states:Array(wlen).fill("empty")};
  });

  const cellW = Math.min(52, Math.floor(Math.min(window.innerWidth-40, 370)/wlen)-6);

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(170deg,#080c10 0%,#0d1520 55%,#080c10 100%)",display:"flex",flexDirection:"column",alignItems:"center",fontFamily:"Georgia,serif",color:"#d8d0c8",padding:"0 8px"}}>
      {/* Header */}
      <div style={{width:"100%",maxWidth:370,padding:"14px 0 4px"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:3}}>
          <span style={{fontSize:10,color:"#483e28",letterSpacing:2}}>KINH THÁNH</span>
          <div style={{display:"flex",gap:8}}>
            {streak>0&&<span style={{fontSize:12,color:"#b07828"}}>🔥{streak}</span>}
            <span style={{fontSize:11,color:"#403428"}}>{played}/{ALL_ENTRIES.length}</span>
          </div>
        </div>
        <h1 style={{textAlign:"center",fontSize:17,margin:"0 0 2px",fontWeight:700,letterSpacing:4,background:"linear-gradient(135deg,#b08030,#ddb84a,#b08030)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>NHÂN VẬT BÍ ẨN</h1>
        <div style={{textAlign:"center",fontSize:11,color:"#504030",letterSpacing:1,marginBottom:4}}>{entry.type==="person"?"👤 Nhân vật":"📍 Địa danh"}</div>
        <div style={{textAlign:"center",fontSize:24}}>{entry.emoji}</div>
      </div>

      {/* Scorebar */}
      <div style={{width:"100%",maxWidth:370,display:"flex",justifyContent:"space-between",background:"rgba(180,130,50,0.06)",border:"1px solid rgba(180,130,50,0.12)",borderRadius:9,padding:"5px 12px",marginBottom:8,fontSize:11,color:"#60503a"}}>
        <span>Điểm: <b style={{color:"#b08030"}}>{totalScore}</b></span>
        <span>Thử: <b style={{color:"#ccc"}}>{guesses.length}/{MAX_TRIES}</b></span>
        <span>Ký tự: <b style={{color:"#ccc"}}>{wlen}</b></span>
      </div>

      {/* Hints */}
      <div style={{width:"100%",maxWidth:370,marginBottom:8}}>
        {hintsUsed>0&&entry.hints.slice(0,hintsUsed).map((h,i)=>(
          <div key={i} style={{background:"rgba(180,120,30,0.07)",border:"1px solid rgba(180,120,30,0.16)",borderRadius:8,padding:"6px 11px",fontSize:12,color:"#a08040",lineHeight:1.6,marginBottom:4}}>
            <span style={{color:"#60482a",marginRight:5}}>💡</span>{h}
          </div>
        ))}
        {hintsUsed<entry.hints.length&&state==="playing"?(
          <button onClick={()=>setHintsUsed(h=>h+1)} style={{width:"100%",background:"rgba(180,120,30,0.08)",border:"1px dashed rgba(180,120,30,0.2)",borderRadius:8,padding:"7px",color:"#a07828",fontSize:12,cursor:"pointer"}}>
            💡 Gợi ý {hintsUsed+1}/{entry.hints.length} <span style={{color:"#a04820",fontSize:11}}>(-{HINT_PENALTY}đ)</span>
          </button>
        ):(hintsUsed===0&&state==="playing"&&<div style={{textAlign:"center",fontSize:11,color:"#2e2418"}}>Tự đoán = điểm tối đa!</div>)}
      </div>

      {/* Grid */}
      <div style={{marginBottom:12}}>
        {rows.map((row,ri)=>(
          <div key={ri} style={{display:"flex",gap:5,marginBottom:5,animation:shake&&ri===guesses.length?"shake 0.4s":undefined}}>
            {Array(wlen).fill(null).map((_,li)=>{
              const letter=row.letters[li]||"";
              const st=row.states[li];
              const isRev=revealed.includes(ri);
              const delay=isRev?li*130:0;
              const c=sc[st]||sc.empty;
              const isCur=row.isCurrent&&letter!=="";
              return (
                <div key={li} style={{width:cellW,height:54,border:`2px solid ${isCur?"#b07828":c.bd}`,borderRadius:8,backgroundColor:c.bg,display:"flex",alignItems:"center",justifyContent:"center",fontSize:18,fontWeight:800,color:c.tx,transition:`background-color 0.22s ${delay}ms,border-color 0.22s ${delay}ms,color 0.22s ${delay}ms`,transform:isCur?"scale(1.05)":"scale(1)",boxShadow:st==="correct"?"0 0 8px rgba(45,90,61,0.5)":st==="present"?"0 0 8px rgba(180,120,30,0.3)":"none"}}>
                  {letter}
                </div>
              );
            })}
          </div>
        ))}
      </div>

      {/* Modal */}
      {state!=="playing"&&(
        <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.9)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:100,padding:20}}>
          <div style={{background:"linear-gradient(145deg,#111620,#0c1018)",border:"1px solid rgba(180,130,50,0.3)",borderRadius:18,padding:24,maxWidth:310,width:"100%",textAlign:"center",boxShadow:"0 20px 50px rgba(0,0,0,0.8)"}}>
            <div style={{fontSize:42,marginBottom:6}}>{state==="won"?"🎉":"😔"}</div>
            <div style={{fontSize:16,fontWeight:700,color:state==="won"?"#c8a030":"#c05040",marginBottom:4}}>{state==="won"?"Xuất sắc!":"Chưa đúng!"}</div>
            <div style={{fontSize:12,color:"#604830",marginBottom:6}}>{entry.type==="person"?"👤":"📍"} Đáp án: <b style={{color:"#c8a030"}}>{entry.display}</b></div>
            {state==="won"&&lastScore!==null&&(
              <div style={{background:"rgba(180,130,50,0.1)",borderRadius:9,padding:"7px",marginBottom:8}}>
                <span style={{color:"#c8a030",fontSize:22,fontWeight:800}}>+{lastScore}đ</span>
                {hintsUsed>0&&<div style={{fontSize:10,color:"#805030",marginTop:1}}>đã trừ {hintsUsed*HINT_PENALTY}đ gợi ý</div>}
              </div>
            )}
            <div style={{background:"rgba(255,255,255,0.03)",borderRadius:9,padding:"9px 12px",fontSize:12,color:"#a09070",lineHeight:1.7,marginBottom:16,textAlign:"left"}}>{entry.story}</div>
            <button onClick={()=>setQi(i=>i+1)} style={{width:"100%",background:"linear-gradient(135deg,#8a6020,#b8922a)",border:"none",borderRadius:11,padding:"11px",color:"#fff",fontSize:14,fontWeight:700,cursor:"pointer"}}>Câu tiếp theo →</button>
          </div>
        </div>
      )}

      {/* Keyboard */}
      <div style={{width:"100%",maxWidth:370}}>
        {KEYS.map((row,ri)=>(
          <div key={ri} style={{display:"flex",justifyContent:"center",gap:4,marginBottom:4}}>
            {row.map(k=>{
              const kc=keyColor(k);
              const isSp=k==="ENTER"||k==="DEL";
              return(
                <button key={k} onClick={()=>handleKey(k)} style={{flex:isSp?1.6:1,maxWidth:isSp?56:34,height:44,background:kBg[kc],border:"none",borderRadius:6,color:kTx[kc],fontSize:isSp?9:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                  {k==="DEL"?"⌫":k}
                </button>
              );
            })}
          </div>
        ))}
      </div>
      <div style={{height:16}}/>
      <style>{`@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-5px)}40%{transform:translateX(5px)}60%{transform:translateX(-3px)}80%{transform:translateX(3px)}}`}</style>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
